services:
  aisu:
    build: .
    container_name: aisu
    shm_size: "256m"
    ports:
      - "7890:7890"
    volumes:
      - aisu_data:/app/data
      - ./skills:/app/skills:ro
      - ./workspace:/app/data/workspace
    environment:
      - TZ=Asia/Shanghai
      - SANDBOX_MODE=host
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - SEARXNG_BASE_URL=http://searxng:8080
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/opt/chromium/chrome-linux64/chrome
      - MODEL_NAME=${MODEL_NAME:-deepseek-chat}
      - DATA_DIR=/app/data
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-aisu}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SITE_URL=${SITE_URL:-http://localhost:7890}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_SEARCH_TTL=${REDIS_SEARCH_TTL:-300}
    depends_on:
      - searxng
      - redis
    restart: unless-stopped

  celery-worker:
    build: .
    container_name: aisu-celery-worker
    volumes:
      - aisu_data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - DATA_DIR=/app/data
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - MODEL_NAME=${MODEL_NAME:-deepseek-chat}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SITE_URL=${SITE_URL:-http://localhost:7890}
      - MEMORY_DIR=/app/data/memory
    command: celery -A server.celery_tasks worker -Q email,celery -l info --concurrency=2
    depends_on:
      - redis
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: aisu-celery-beat
    volumes:
      - aisu_data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - DATA_DIR=/app/data
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - MODEL_NAME=${MODEL_NAME:-deepseek-chat}
      - MEMORY_DIR=/app/data/memory
    command: celery -A server.celery_tasks beat -l info
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aisu-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8889:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-changeme123456789}
      - SEARXNG_BASE_URL=http://localhost:8889
    restart: unless-stopped

volumes:
  aisu_data:
  searxng_data:
  redis_data:
