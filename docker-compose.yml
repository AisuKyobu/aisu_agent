services:
  aisu:
    build: .
    container_name: aisu
    ports:
      - "7890:7890"
    volumes:
      - aisu_data:/app/data
      - ./skills:/app/skills:ro
      - ./workspace:/app/data/workspace
    environment:
      - TZ=Asia/Shanghai
      - SANDBOX_MODE=host
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - SEARXNG_BASE_URL=http://searxng:8080
      - MODEL_NAME=${MODEL_NAME:-deepseek-chat}
      - DATA_DIR=/app/data
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-aisu}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SITE_URL=${SITE_URL:-http://localhost:7890}
    depends_on:
      - searxng
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8889:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-changeme123456789}
      - SEARXNG_BASE_URL=http://localhost:8889
    restart: unless-stopped

volumes:
  aisu_data:
  searxng_data:
