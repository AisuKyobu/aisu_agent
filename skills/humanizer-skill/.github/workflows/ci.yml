name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate Skill
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for file in README.md LICENSE CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md CHANGELOG.md; do
            if [ ! -f "$file" ]; then
              echo "FAIL: Missing $file"
              exit 1
            fi
          done
          if [ ! -f "skills/humanizer/SKILL.md" ]; then
            echo "FAIL: Missing skills/humanizer/SKILL.md"
            exit 1
          fi
          echo "All required files present"

      - name: Validate SKILL.md structure
        run: |
          SKILL="skills/humanizer/SKILL.md"
          for section in "## Step 2: Detect AI Patterns" "Voice Profiles" "Soul Injection"; do
            if ! grep -q "$section" "$SKILL"; then
              echo "FAIL: Missing section '$section' in SKILL.md"
              exit 1
            fi
          done
          echo "SKILL.md structure valid"

      - name: Check pattern count
        run: |
          COUNT=$(grep -cE "^\\*\\*P[0-9]+: " skills/humanizer/SKILL.md || true)
          EXPECTED=43
          if [ "$COUNT" -lt "$EXPECTED" ]; then
            echo "FAIL: Expected at least $EXPECTED patterns, found $COUNT"
            exit 1
          fi
          echo "Pattern count OK: $COUNT patterns (>= $EXPECTED)"

      - name: No em dashes in SKILL.md or README
        run: |
          # SKILL.md treats em dashes as a banned pattern (P13). Skill itself must not violate its own rule.
          if grep -lP '[\x{2014}]' skills/humanizer/SKILL.md README.md 2>/dev/null; then
            echo "FAIL: em dash (U+2014) found in core docs (violates P13)"
            grep -nP '[\x{2014}]' skills/humanizer/SKILL.md README.md || true
            exit 1
          fi
          echo "Zero em dashes in core docs"

      - name: Pattern badge matches actual count
        run: |
          BADGE=$(grep -oE 'patterns-[0-9]+' README.md | head -1 | grep -oE '[0-9]+')
          ACTUAL=$(grep -cE "^\\*\\*P[0-9]+: " skills/humanizer/SKILL.md)
          if [ "$BADGE" != "$ACTUAL" ]; then
            echo "FAIL: README badge says $BADGE patterns, SKILL.md has $ACTUAL"
            exit 1
          fi
          echo "Badge count matches: $BADGE"

      - name: No internal files leaked
        run: |
          FOUND=0
          for dir in .planning .deep-research .omc .claude-plugin; do
            if [ -d "$dir" ]; then
              echo "FAIL: Internal directory $dir found in repo"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "No internal files leaked"
