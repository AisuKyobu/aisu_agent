<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    @keyframes aiLabelIn {
      0%,5%{ opacity:0; } 10%,65%{ opacity:1; } 75%,100%{ opacity:0; }
    }
    @keyframes humanLabelIn {
      0%,68%{ opacity:0; } 75%,100%{ opacity:1; }
    }
    @keyframes cursorLife {
      0%,33%{ opacity:1; } 34%,100%{ opacity:0; }
    }
    @keyframes badWord1 {
      0%,33%{ fill:#e0e7ff; }
      38%,52%{ fill:#f87171; }
      54%,64%{ fill:#f87171; }
      70%,100%{ fill:#f87171; opacity:0; }
    }
    @keyframes badWord2 {
      0%,36%{ fill:#e0e7ff; }
      42%,55%{ fill:#f87171; }
      57%,66%{ fill:#f87171; }
      72%,100%{ fill:#f87171; opacity:0; }
    }
    @keyframes badWord3 {
      0%,39%{ fill:#e0e7ff; }
      44%,58%{ fill:#f87171; }
      60%,68%{ fill:#f87171; }
      74%,100%{ fill:#f87171; opacity:0; }
    }
    @keyframes aiNeutral {
      0%,60%{ opacity:1; } 68%,100%{ opacity:0; }
    }
    @keyframes strike1 {
      0%,51%{ opacity:0; transform:scaleX(0); }
      56%{ opacity:1; transform:scaleX(1); }
      68%,100%{ opacity:0; }
    }
    @keyframes strike2 {
      0%,53%{ opacity:0; transform:scaleX(0); }
      58%{ opacity:1; transform:scaleX(1); }
      69%,100%{ opacity:0; }
    }
    @keyframes strike3 {
      0%,55%{ opacity:0; transform:scaleX(0); }
      60%{ opacity:1; transform:scaleX(1); }
      70%,100%{ opacity:0; }
    }
    @keyframes arrowPop {
      0%,60%{ opacity:0.2; transform:scale(0.8); }
      70%,100%{ opacity:1; transform:scale(1.15); }
    }
    @keyframes humanReveal {
      0%,68%{ opacity:0; transform:translateY(6px); }
      78%,100%{ opacity:1; transform:translateY(0); }
    }
    @keyframes humanCursor {
      0%,74%{ opacity:0; }
      75%,88%{ opacity:1; }
      89%,94%{ opacity:0; }
      95%,100%{ opacity:1; }
    }
    @keyframes highlight1 {
      0%,35%{ opacity:0; } 40%,52%{ opacity:1; } 54%,100%{ opacity:0; }
    }
    @keyframes highlight2 {
      0%,38%{ opacity:0; } 43%,55%{ opacity:1; } 57%,100%{ opacity:0; }
    }
    @keyframes highlight3 {
      0%,41%{ opacity:0; } 46%,58%{ opacity:1; } 60%,100%{ opacity:0; }
    }

    .ai-label    { animation: aiLabelIn    6s ease-in-out infinite; }
    .human-label { animation: humanLabelIn 6s ease-in-out infinite; }
    .cursor-ai   { animation: cursorLife   6s step-end infinite; }
    .cursor-human{ animation: humanCursor  6s step-end infinite; }
    .bw1         { animation: badWord1     6s ease-in-out infinite; }
    .bw2         { animation: badWord2     6s ease-in-out infinite; }
    .bw3         { animation: badWord3     6s ease-in-out infinite; }
    .neutral     { animation: aiNeutral    6s ease-in-out infinite; }
    .strike1     { animation: strike1      6s ease-out infinite; transform-origin: left center; }
    .strike2     { animation: strike2      6s ease-out infinite; transform-origin: left center; }
    .strike3     { animation: strike3      6s ease-out infinite; transform-origin: left center; }
    .arrow       { animation: arrowPop     6s cubic-bezier(0.34,1.56,0.64,1) infinite; transform-origin: center; }
    .clean-text  { animation: humanReveal  6s cubic-bezier(0.34,1.56,0.64,1) infinite; }
    .hl1         { animation: highlight1   6s ease-in-out infinite; }
    .hl2         { animation: highlight2   6s ease-in-out infinite; }
    .hl3         { animation: highlight3   6s ease-in-out infinite; }
  </style>

  <!-- Dark background card -->
  <rect x="10" y="15" width="700" height="170" rx="20" fill="#1a0a2e" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Left panel label -->
  <text class="ai-label" x="38" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#f87171" letter-spacing="1">AI OUTPUT</text>

  <!-- Right panel label -->
  <text class="human-label" x="420" y="46" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#4ade80" letter-spacing="1">HUMAN</text>

  <!-- AI text line 1 -->
  <text class="neutral" x="38" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#e0e7ff">This</text>
  <rect class="hl1" x="68" y="63" width="112" height="20" rx="3" fill="#7f1d1d" opacity="0.7"/>
  <text class="bw1" x="68" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#e0e7ff">comprehensive</text>
  <line class="strike1" x1="68" y1="71" x2="180" y2="71" stroke="#f87171" stroke-width="1.5"/>
  <text class="neutral" x="184" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#e0e7ff">guide</text>

  <!-- AI text line 2 -->
  <rect class="hl2" x="38" y="90" width="78" height="20" rx="3" fill="#7f1d1d" opacity="0.7"/>
  <text class="bw2" x="38" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#e0e7ff">delves into</text>
  <line class="strike2" x1="38" y1="98" x2="116" y2="98" stroke="#f87171" stroke-width="1.5"/>
  <text class="neutral" x="120" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#e0e7ff">the</text>

  <!-- AI text line 3 -->
  <rect class="hl3" x="38" y="117" width="54" height="20" rx="3" fill="#7f1d1d" opacity="0.7"/>
  <text class="bw3" x="38" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#e0e7ff">pivotal</text>
  <line class="strike3" x1="38" y1="125" x2="92" y2="125" stroke="#f87171" stroke-width="1.5"/>
  <text class="neutral" x="96" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#e0e7ff">aspects of auth.</text>

  <rect class="cursor-ai" x="236" y="120" width="1.5" height="16" rx="1" fill="#a78bfa"/>

  <!-- Divider -->
  <line x1="355" y1="35" x2="355" y2="170" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4,3"/>
  <g class="arrow" transform="translate(355,105)">
    <circle cx="0" cy="0" r="14" fill="#8b5cf6" opacity="0.2"/>
    <path d="M-5,-4 L5,0 L-5,4" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Clean human text -->
  <g class="clean-text">
    <text x="390" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#4ade80" font-weight="600">The auth system</text>
    <text x="390" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#e0e7ff">uses JWTs. Tokens</text>
    <text x="390" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#e0e7ff">expire after 24 h.</text>
    <rect class="cursor-human" x="523" y="120" width="1.5" height="16" rx="1" fill="#4ade80"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#a78bfa" opacity="0.5" font-weight="600" letter-spacing="-0.3">humanizer</text>
</svg>
