<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    @keyframes write {
      0%,100% { transform: translateX(0); }
      30% { transform: translateX(2px); }
      60% { transform: translateX(-1px); }
      80% { transform: translateX(3px); }
    }
    @keyframes pulse {
      0%,100% { opacity: 0.25; transform: scaleX(0.92); }
      50% { opacity: 1; transform: scaleX(1); }
    }
    @keyframes inkFlow {
      0%,100% { r: 1.2; opacity: 0.5; }
      50% { r: 2; opacity: 1; }
    }
    @keyframes shimmer {
      0%,100% { opacity: 0.04; }
      50% { opacity: 0.1; }
    }
    .line1 { animation: pulse 2.8s ease-in-out infinite; transform-origin: left center; }
    .line2 { animation: pulse 2.8s ease-in-out infinite 0.5s; transform-origin: left center; }
    .line3 { animation: pulse 2.8s ease-in-out infinite 1.0s; transform-origin: left center; }
    .line4 { animation: pulse 2.8s ease-in-out infinite 1.5s; transform-origin: left center; }
    .pen-group { animation: write 4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    .ink-dot { animation: inkFlow 2s ease-in-out infinite; }
    .bg-shimmer { animation: shimmer 6s ease-in-out infinite; }
  </style>
  <rect x="10" y="20" width="700" height="160" rx="24" fill="#1a0a2e" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.2"/>
  <!-- Subtle background shimmer -->
  <rect class="bg-shimmer" x="10" y="20" width="700" height="160" rx="24" fill="#a78bfa"/>
  <!-- Document with text lines -->
  <g transform="translate(45, 45)">
    <!-- Paper shadow -->
    <rect x="2" y="12" width="58" height="78" rx="6" fill="#0f0520" opacity="0.6"/>
    <!-- Paper back -->
    <rect x="0" y="8" width="58" height="78" rx="6" fill="#2d1b4e" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Paper front -->
    <rect x="6" y="0" width="58" height="78" rx="6" fill="#1e1145" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Text lines on paper -->
    <line class="line1" x1="16" y1="18" x2="52" y2="18" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line class="line2" x1="16" y1="30" x2="46" y2="30" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round"/>
    <line class="line3" x1="16" y1="42" x2="50" y2="42" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
    <line class="line4" x1="16" y1="54" x2="40" y2="54" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Fountain pen overlapping the document -->
    <g class="pen-group" transform="translate(42, 20) rotate(35)">
      <!-- Pen barrel -->
      <rect x="0" y="-4" width="48" height="8" rx="3" fill="#a78bfa"/>
      <!-- Barrel highlight -->
      <rect x="4" y="-3" width="40" height="2" rx="1" fill="#c4b5fd" opacity="0.3"/>
      <!-- Pen grip -->
      <rect x="-8" y="-3.5" width="12" height="7" rx="2" fill="#8b5cf6"/>
      <!-- Pen nib -->
      <path d="M -8,-2.5 L -18,0 L -8,2.5 Z" fill="#e0e7ff"/>
      <path d="M -18,0 L -14,-0.8 L -14,0.8 Z" fill="#c4b5fd"/>
      <!-- Pen clip -->
      <rect x="20" y="-6.5" width="14" height="2" rx="1" fill="#8b5cf6"/>
      <!-- Ink dot at nib tip with flow animation -->
      <circle class="ink-dot" cx="-18" cy="0" r="1.5" fill="#a78bfa"/>
    </g>
  </g>
  <!-- Title -->
  <text x="175" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#e0e7ff" letter-spacing="-1">humanizer</text>
  <!-- Subtitle -->
  <text x="175" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#a78bfa" font-weight="500">Make AI Text Sound Human</text>
  <!-- Tagline -->
  <text x="175" y="147" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">43 patterns  ·  5 voices  ·  90+ sources  ·  Zero deps  ·  One markdown file</text>
</svg>
