    .h-lbl{animation:humanLabel 5s ease-in-out infinite}
    .ai-mode{animation:modeAI 5s ease-in-out infinite}
    .h-mode{animation:modeHuman 5s ease-in-out infinite}
    .ul{animation:uniformLine 5s ease-in-out infinite}
    .vr{animation:variance 5s ease-in-out infinite}
    .wc{animation:wc 5s ease-in-out infinite}
    .r1{animation:b1 5s cubic-bezier(.34,1.56,.64,1) infinite}
    .r2{animation:b2 5s cubic-bezier(.34,1.56,.64,1) infinite}
    .r3{animation:b3 5s cubic-bezier(.34,1.56,.64,1) infinite}
