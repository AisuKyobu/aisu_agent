<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aisu</title>
<link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
<header><div class="logo"><code>&gt;_</code>Aisu</div></header>
<div class="tabs">
  <button class="active" data-tab="chat">聊天</button>
  <button data-tab="monitor">监控</button>
  <button data-tab="skills">技能</button>
  <button data-tab="workspace">指令</button>
  <button data-tab="cron">定时</button>
</div>
<div class="main">

<div class="tab active" id="tab-chat">
  <div class="chat-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <button class="btn btn-primary btn-sm" onclick="newSession()">+ 新会话</button>
      </div>
      <div class="sidebar-list" id="session-list"></div>
    </div>
    <div class="chat-area">
      <div class="chat-msgs" id="chat-msgs">
        <div class="chat-empty">选择一个会话开始聊天</div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn btn-primary" onclick="sendChat()">发送</button>
      </div>
    </div>
  </div>
</div>

<div class="tab" id="tab-monitor">
  <div style="padding:20px;overflow:auto;flex:1">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="color:var(--text-dim);font-size:11px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)">
          <th style="padding:6px 8px">会话</th>
          <th style="padding:6px 8px;width:70px;text-align:center">来源</th>
          <th style="padding:6px 8px;width:80px">状态</th>
          <th style="padding:6px 8px;width:75px">模式</th>
          <th style="padding:6px 8px;width:80px">任务</th>
          <th style="padding:6px 8px;width:70px">步数</th>
          <th style="padding:6px 8px">工具</th>
          <th style="padding:6px 8px;width:80px">最后活跃</th>
        </tr>
      </thead>
      <tbody id="monitor-tbody"></tbody>
    </table>
    <div id="monitor-detail" style="display:none;margin-top:16px;background:var(--bg-card);border-radius:8px;padding:16px;border:1px solid rgba(255,255,255,.05)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span id="monitor-detail-title" style="font-weight:600;color:var(--pink)"></span>
        <button class="btn btn-sm" style="background:rgba(255,255,255,.05);color:var(--text-dim)" onclick="document.getElementById('monitor-detail').style.display='none'">关闭</button>
      </div>
      <div id="monitor-detail-body"></div>
    </div>
  </div>
</div>

<div class="tab" id="tab-skills">
  <div style="padding:20px;overflow:auto;flex:1">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px">
      <span style="color:var(--text-dim);font-size:13px">安装新技能 (.zip):</span>
      <input type="file" id="skill-zip-input" accept=".zip" style="color:var(--text-dim)">
      <button class="btn btn-primary btn-sm" onclick="installSkillZip()">上传安装</button>
    </div>
    <div id="skill-list" style="display:flex;flex-wrap:wrap;gap:12px">
      {% for skill in skills %}
      <div class="card" style="flex:1;min-width:200px;max-width:280px">
        <div class="card-title">{{ skill.name }}</div>
        <p style="font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:12px">{{ skill.description }}</p>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="tag" data-skill-name="{{ skill.name }}" onclick="toggleSkill('{{ skill.name }}', false)" style="cursor:pointer">{{ '已启用' if skill.enabled else '已禁用' }}</span>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>

<div class="tab" id="tab-workspace">
  <div style="display:flex;flex:1;overflow:hidden">
    <div class="sidebar" style="width:180px">
      <div class="sidebar-header">
        <span style="font-size:13px;color:var(--text-dim)">工作区文件</span>
      </div>
      <div class="sidebar-list" id="ws-file-list">
        <div class="sidebar-item active" data-file="AGENTS.md" onclick="openWsFile('AGENTS.md')">AGENTS.md</div>
        <div class="sidebar-item" data-file="USER.md" onclick="openWsFile('USER.md')">USER.md</div>
      </div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span id="ws-filename" style="font-weight:600;font-size:14px">AGENTS.md</span>
        <button class="btn btn-primary btn-sm" onclick="saveWorkspace()">保存</button>
      </div>
      <p id="ws-hint" style="color:var(--text-dim);font-size:12px;margin-bottom:8px"></p>
      <textarea id="ws-editor" style="flex:1"></textarea>
    </div>
  </div>
</div>

<div class="tab" id="tab-cron">
  <div id="cron-container" style="padding:20px;overflow:auto;flex:1">
    <div class="empty-state"><div class="icon">⏰</div><p>暂无定时任务</p></div>
  </div>
</div>

</div>
<footer id="status-bar">就绪</footer>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/app.js?v=2"></script>
</body>
</html>
