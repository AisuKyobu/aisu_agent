# 公开演示部署配置 — DEMO_MODE 限制每 IP 5 条消息 + 只读工具
# 使用: docker compose -f docker-compose.demo.yml up -d --build

services:
  aisu:
    build: .
    container_name: aisu-demo
    shm_size: "256m"
    ports:
      - "7890:7890"
    volumes:
      - aisu_demo_data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - SANDBOX_MODE=host
      - DEMO_MODE=true
      - DEMO_MAX_MSG_PER_IP=5
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - SEARXNG_BASE_URL=http://searxng:8080
      - DATA_DIR=/app/data
      - SITE_URL=${SITE_URL:-http://localhost:7890}
      - MODEL_NAME=${MODEL_NAME:-deepseek-chat}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_SEARCH_TTL=${REDIS_SEARCH_TTL:-300}
    depends_on:
      - searxng
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aisu-redis-demo
    restart: unless-stopped
    volumes:
      - redis_demo_data:/data

  searxng:
    image: searxng/searxng:latest
    container_name: searxng-demo
    ports:
      - "8889:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-changeme123456789}
      - SEARXNG_BASE_URL=http://localhost:8889
    restart: unless-stopped

volumes:
  aisu_demo_data:
  searxng_data:
  redis_demo_data:
